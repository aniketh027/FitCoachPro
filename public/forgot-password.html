<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - FitCoach Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --gold:       #F5C518;
      --gold-dim:   #B8950F;
      --gold-soft:  rgba(245, 197, 24, 0.08);
      --bg:         #0A0A0A;
      --bg2:        #111111;
      --bg3:        #1A1A1A;
      --bg4:        #222222;
      --text:       #F0F0F0;
      --text-muted: #888888;
      --text-dim:   #444444;
      --radius:     16px;
      --radius-sm:  10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(245,197,24,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,197,24,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    .bg-glow {
      position: fixed;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,197,24,0.06) 0%, transparent 70%);
      bottom: -200px; right: -150px;
      pointer-events: none; z-index: 0;
    }

    .bg-glow-2 {
      position: fixed;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,197,24,0.04) 0%, transparent 70%);
      top: -100px; left: -100px;
      pointer-events: none; z-index: 0;
    }

    .auth-wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand { text-align: center; margin-bottom: 24px; }

    .brand-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem; letter-spacing: 4px;
      color: var(--gold); line-height: 1; display: block;
    }

    .brand-tagline {
      font-size: 0.75rem; color: var(--text-dim);
      letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
    }

    .auth-card {
      background: var(--bg2);
      border: 1px solid rgba(245,197,24,0.1);
      border-radius: var(--radius);
      padding: 36px 36px 32px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .card-icon {
      width: 52px; height: 52px;
      background: var(--gold-soft);
      border: 1px solid rgba(245,197,24,0.2);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      color: var(--gold);
    }

    .auth-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem; letter-spacing: 2px;
      color: var(--text); margin-bottom: 6px;
    }

    .auth-subheading {
      font-size: 0.84rem; color: var(--text-muted);
      margin-bottom: 28px; line-height: 1.6;
    }

    .field-wrap { display: flex; flex-direction: column; margin-bottom: 20px; }

    .field-label {
      font-size: 0.7rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 7px; display: block;
    }

    .input-shell { position: relative; display: flex; align-items: center; }

    .input-shell input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--bg4);
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-shell input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-soft);
    }

    .input-shell input::placeholder { color: var(--text-dim); }

    .input-shell input:-webkit-autofill,
    .input-shell input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #1A1A1A inset;
      -webkit-text-fill-color: var(--text);
    }

    .btn-submit {
      width: 100%; padding: 14px;
      background: var(--gold); color: #000;
      border: none; border-radius: var(--radius-sm);
      font-size: 0.92rem; font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.3px;
      position: relative; overflow: hidden;
    }

    .btn-submit::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }

    .btn-submit:hover {
      background: #f7ce3a;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(245,197,24,0.3);
    }

    .btn-submit:active { transform: translateY(0); }

    .back-link {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-top: 22px;
      font-size: 0.84rem; color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--gold); }
    .back-link svg { transition: transform 0.2s; }
    .back-link:hover svg { transform: translateX(-3px); }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 22px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <div class="auth-wrapper">

    <div class="brand">
      <span class="brand-logo">FitCoach Pro</span>
      <span class="brand-tagline">Start your transformation today</span>
    </div>

    <div class="auth-card">

      <div class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>

      <div class="auth-heading">Forgot Password</div>
      <div class="auth-subheading">Enter your email and we'll send you a link to reset your password.</div>

      <form id="forgotForm">
        <div class="field-wrap">
          <label class="field-label">Email Address</label>
          <div class="input-shell">
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>
        </div>

        <button type="submit" class="btn-submit">Send Reset Link</button>
      </form>

      <a href="login.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back to Sign In
      </a>

    </div>
  </div>

  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
