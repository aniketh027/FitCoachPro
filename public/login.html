<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FitCoach Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --gold: #F5C518;
      --gold-dim: #B8950F;
      --gold-soft: rgba(245, 197, 24, 0.08);
      --gold-glow: rgba(245, 197, 24, 0.15);
      --bg:  #0A0A0A;
      --bg2: #111111;
      --bg3: #1A1A1A;
      --bg4: #222222;
      --text: #F0F0F0;
      --text-muted: #888;
      --text-dim: #444;
      --danger: #E53935;
      --radius: 16px;
      --radius-sm: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── BACKGROUND EFFECTS ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,197,24,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,197,24,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,197,24,0.06) 0%, transparent 70%);
      top: -150px; left: -150px;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow-2 {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,197,24,0.04) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 24px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BRAND ── */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 4px;
      color: var(--gold);
      line-height: 1;
      display: block;
    }

    .brand-tagline {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── CARD ── */
    .auth-card {
      background: var(--bg2);
      border: 1px solid rgba(245,197,24,0.1);
      border-radius: var(--radius);
      padding: 40px 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .auth-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .auth-subheading {
      font-size: 0.84rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    /* ── FORM FIELDS ── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 8px;
    }

    .field-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
      display: block;
    }

    .field-wrap {
      display: flex;
      flex-direction: column;
    }

    .input-shell {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-shell input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--bg4);
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin: 0;
    }

    .input-shell input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-soft);
    }

    .input-shell input::placeholder { color: var(--text-dim); }

    .input-shell input:-webkit-autofill,
    .input-shell input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #1A1A1A inset;
      -webkit-text-fill-color: var(--text);
    }

    /* password input gets padding for eye icon */
    .input-shell.has-eye input { padding-right: 44px; }

    .eye {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      transition: color 0.2s;
      user-select: none;
      line-height: 0;
    }

    .eye:hover { color: var(--text-muted); }

    /* ── FORGOT LINK ── */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .forgot-link {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover { color: var(--gold); text-decoration: none; }

    /* ── SUBMIT BUTTON ── */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.92rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 24px;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }

    .btn-submit:hover {
      background: #f7ce3a;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(245,197,24,0.3);
    }

    .btn-submit:active { transform: translateY(0); }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--bg4);
    }

    .divider span {
      font-size: 0.72rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── SWITCH ── */
    .auth-switch {
      text-align: center;
      font-size: 0.84rem;
      color: var(--text-muted);
    }

    .auth-switch a {
      color: var(--gold);
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .auth-switch a:hover { opacity: 0.8; text-decoration: none; }

    /* ── NOT FOUND MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--bg2);
      border: 1px solid rgba(245,197,24,0.12);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      animation: fadeUp 0.3s ease;
    }

    .modal-icon { font-size: 44px; margin-bottom: 16px; }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 1.5px;
      color: var(--text);
      margin-bottom: 10px;
    }

    .modal-desc {
      font-size: 0.84rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .modal-desc strong { color: var(--text); font-weight: 600; }

    .modal-question {
      font-size: 0.84rem;
      color: var(--text-muted);
      margin: 16px 0 24px;
      padding: 14px 16px;
      background: var(--gold-soft);
      border: 1px solid rgba(245,197,24,0.1);
      border-radius: var(--radius-sm);
      line-height: 1.5;
    }

    .modal-actions { display: flex; gap: 10px; }

    .modal-btn-primary {
      flex: 1;
      padding: 12px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-btn-primary:hover { background: #f7ce3a; }

    .modal-btn-secondary {
      flex: 1;
      padding: 12px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--bg4);
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── TOAST (keep global) ── */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 10px; z-index: 9999;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="brand">
      <span class="brand-logo">FitCoach Pro</span>
      <span class="brand-tagline">Your personal fitness companion</span>
    </div>

    <!-- Card -->
    <div class="auth-card">
      <div class="auth-heading">Welcome back</div>
      <div class="auth-subheading">Sign in to continue your fitness journey</div>

      <form id="loginForm">
        <div class="field-group">

          <div class="field-wrap">
            <label class="field-label">Email address</label>
            <div class="input-shell">
              <input type="email" id="email" placeholder="you@example.com" required>
            </div>
          </div>

          <div class="field-wrap">
            <label class="field-label">Password</label>
            <div class="input-shell has-eye">
              <input type="password" id="password" placeholder="Enter your password" required>
              <span class="eye" onclick="togglePassword('password', this)">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                  <line class="eye-slash" x1="2" y1="2" x2="22" y2="22" style="display:none"/>
                </svg>
              </span>
            </div>
            <div class="forgot-row">
              <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
            </div>
          </div>

        </div>

        <button type="submit" class="btn-submit">Sign In</button>
      </form>

      <div class="divider"><span>or</span></div>

      <div class="auth-switch">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>

  </div>

  <!-- NOT FOUND MODAL -->
  <div class="modal-overlay" id="notFoundModal">
    <div class="modal-box">
      <div class="modal-icon">🤔</div>
      <div class="modal-title">Account Not Found</div>
      <p class="modal-desc">
        We couldn't find an account for<br>
        <strong id="modalEmail"></strong>
      </p>
      <p class="modal-question">Would you like to create a new account with this email?</p>
      <div class="modal-actions">
        <button class="modal-btn-secondary" id="modalNoBtn">No, try again</button>
        <button class="modal-btn-primary"   id="modalYesBtn">Yes, register me</button>
      </div>
    </div>
  </div>

  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
