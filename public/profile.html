<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — FitCoach Pro</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --gold: #F5C518;
      --gold-dim: #B8950F;
      --gold-soft: rgba(245, 197, 24, 0.10);
      --bg: #0E0E0E;
      --bg2: #161616;
      --bg3: #1E1E1E;
      --bg4: #252525;
      --bg5: #2E2E2E;
      --text: #F0F0F0;
      --text-muted: #888;
      --text-dim: #555;
      --success: #4CAF50;
      --danger: #E53935;
      --radius: 14px;
      --radius-sm: 8px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(14, 14, 14, 0.97);
      border-bottom: 1px solid rgba(245, 197, 24, 0.1);
      padding: 0 28px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 2px;
      color: var(--gold);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    .nav-avatar-link {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      object-fit: cover;
    }

    #navName {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text) !important;
    }

    #logoutBtn {
      background: transparent;
      border: 1px solid var(--text-dim);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    #logoutBtn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ── PAGE LAYOUT ── */
    .page-wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 20px 80px;
    }

    .page-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 0.84rem;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 28px;
      transition: color 0.2s;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .page-back:hover {
      color: var(--gold);
    }

    /* ── PROFILE HERO CARD ── */
    .profile-hero {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius);
      padding: 32px 28px;
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 16px;
      position: relative;
    }

    .hero-avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .hero-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--gold);
      display: block;
    }

    .hero-info {
      flex: 1;
    }

    .hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .hero-tag {
      background: var(--bg3);
      border: 1px solid var(--bg4);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.76rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .bmi-tag {
      background: var(--gold-soft);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .hero-edit-btn {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 22px;
      font-size: 0.84rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .hero-edit-btn:hover {
      opacity: 0.85;
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-pill {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius);
      padding: 18px 16px;
      text-align: center;
    }

    .stat-pill-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--text);
      letter-spacing: 1px;
      line-height: 1;
    }

    .stat-pill-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ── SECTION CARD ── */
    .section-card {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--bg3);
    }

    /* ── EDIT FORM ── */
    .edit-form {
      display: none;
    }

    .edit-form.active {
      display: block;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    .form-field label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-field input,
    .form-field select {
      background: var(--bg3);
      border: 1px solid var(--bg4);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      margin: 0;
    }

    .form-field input:focus,
    .form-field select:focus {
      border-color: var(--gold);
    }

    .form-field input.invalid,
    .form-field select.invalid {
      border-color: var(--danger) !important;
    }

    .form-field select option {
      background: var(--bg3);
      color: var(--text);
    }

    .form-field input:-webkit-autofill,
    .form-field input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #1E1E1E inset;
      -webkit-text-fill-color: var(--text);
    }

    .field-error {
      font-size: 0.72rem;
      color: var(--danger);
      margin-top: 2px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-save {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 24px;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-save:hover:not(:disabled) {
      opacity: 0.85;
    }

    .btn-save:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-cancel {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--bg4);
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    /* ── PHOTO UPLOAD ── */
    .photo-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .photo-thumb {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--bg4);
      flex-shrink: 0;
    }

    .photo-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-choose-photo {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--bg4);
      border-radius: var(--radius-sm);
      padding: 9px 18px;
      font-size: 0.84rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-block;
      text-align: center;
    }

    .btn-choose-photo:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .photo-hint {
      font-size: 0.74rem;
      color: var(--text-dim);
    }

    /* ── PASSWORD FIELDS ── */
    .pw-field {
      position: relative;
    }

    .pw-field input {
      padding-right: 44px;
    }

    .pw-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 1rem;
      transition: color 0.2s;
      padding: 4px;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      line-height: 0;
    }

    .pw-eye:hover {
      color: var(--text-muted);
    }

    .pw-eye:focus {
      outline: none;
      box-shadow: none;
      background: none;
    }

    .pw-eye:active {
      background: none;
    }

    .pw-eye svg {
      display: block;
    }

    .pw-strength {
      height: 3px;
      border-radius: 2px;
      margin-top: 6px;
      background: var(--bg4);
      overflow: hidden;
    }

    .pw-strength-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }

    /* ── CROP MODAL ── */
    .crop-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }

    .crop-modal-overlay.open {
      display: flex;
    }

    .crop-modal {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius);
      width: 90%;
      max-width: 480px;
      overflow: hidden;
    }

    .crop-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid var(--bg3);
    }

    .crop-modal-header h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: var(--text);
      margin: 0;
    }

    .crop-close-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.1rem;
      transition: color 0.2s;
      padding: 4px;
    }

    .crop-close-btn:hover {
      color: var(--danger);
    }

    .crop-modal-body {
      padding: 20px 22px;
    }

    .crop-container {
      width: 100%;
      height: 280px;
      background: var(--bg3);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .crop-container img {
      max-width: 100%;
      display: block;
    }

    .crop-controls {
      margin-top: 14px;
    }

    .crop-controls label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 8px;
    }

    .zoom-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .zoom-row span {
      font-size: 1rem;
    }

    .zoom-row input[type="range"] {
      flex: 1;
      accent-color: var(--gold);
      height: 4px;
      cursor: pointer;
      background: none;
      border: none;
      margin: 0;
      padding: 0;
      width: auto;
    }

    .crop-modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 22px;
      border-top: 1px solid var(--bg3);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .profile-hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-meta {
        justify-content: center;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-field.full {
        grid-column: 1;
      }

      .stats-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar" style="display:none">
    <a href="dashboard.html" class="navbar-brand">FITCOACH PRO</a>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li>
        <a href="profile.html" class="nav-avatar-link">
          <img id="navAvatar" src="/images/default-avatar.svg" alt="Profile" class="nav-avatar">
          <span id="navName"></span>
        </a>
      </li>
      <li><button id="logoutBtn">Logout</button></li>
    </ul>
  </nav>

  <div class="page-wrapper">

    <button id="backBtn" class="page-back">← Back to Dashboard</button>

    <!-- ── PROFILE VIEW ── -->
    <div id="profileView" style="display:none">

      <!-- Hero Card -->
      <div class="profile-hero">
        <div class="hero-avatar-wrap">
          <img id="profilePicImg" src="/images/default-avatar.svg" alt="Avatar" class="hero-avatar">
        </div>
        <div class="hero-info">
          <div class="hero-name" id="vName">—</div>
          <div class="hero-meta">
            <span class="hero-tag" id="vGenderTag">—</span>
            <span class="hero-tag" id="vAgeTag">—</span>
            <span class="bmi-tag" id="vBmiTag">—</span>
          </div>
          <button id="editBtn" class="hero-edit-btn">Edit Profile</button>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="stats-row">
        <div class="stat-pill">
          <div class="stat-pill-val" id="vWeight">—</div>
          <div class="stat-pill-label">Weight (kg)</div>
        </div>
        <div class="stat-pill">
          <div class="stat-pill-val" id="vHeight">—</div>
          <div class="stat-pill-label">Height (cm)</div>
        </div>
        <div class="stat-pill">
          <div class="stat-pill-val" id="vBmi">—</div>
          <div class="stat-pill-label">BMI</div>
        </div>
      </div>

    </div>

    <!-- ── EDIT FORM CARD ── -->
    <div class="section-card" id="editCard" style="display:none">
      <div class="section-title">Edit Profile</div>
      <form id="profileForm">
        <div class="form-grid">
          <div class="form-field full">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Your name" required>
            <span class="field-error" id="nameErr"></span>
          </div>
          <div class="form-field">
            <label>Gender</label>
            <select id="gender" required>
              <option value="">Select gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-field">
            <label>Age</label>
            <input type="number" id="age" placeholder="e.g. 21" min="10" max="100" required>
            <span class="field-error" id="ageErr"></span>
          </div>
          <div class="form-field">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="e.g. 70" min="20" max="300" required>
            <span class="field-error" id="weightErr"></span>
          </div>
          <div class="form-field">
            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="e.g. 175" min="50" max="250" required>
            <span class="field-error" id="heightErr"></span>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-save" id="saveBtn" disabled>Save Changes</button>
          <button type="button" class="btn-cancel" id="cancelEditBtn">Cancel</button>
        </div>
      </form>
    </div>

    <!-- ── PROFILE PICTURE ── -->
    <div class="section-card">
      <div class="section-title">Profile Picture</div>
      <div class="photo-row">
        <img id="profilePicPreview" src="/images/default-avatar.svg" alt="Preview" class="photo-thumb">
        <div class="photo-actions">
          <label for="profilePicInput" class="btn-choose-photo">Choose Photo</label>
          <input type="file" id="profilePicInput" accept="image/jpeg,image/png,image/webp" style="display:none">
          <span class="photo-hint">JPG, PNG or WEBP — max 2MB</span>
        </div>
      </div>
    </div>

    <!-- ── CHANGE PASSWORD ── -->
    <div class="section-card">
      <div class="section-title">Change Password</div>
      <form id="changePwForm">
        <div class="form-grid">

          <!-- Current Password -->
          <div class="form-field full">
            <label>Current Password</label>
            <div class="pw-field">
              <input type="password" id="currentPassword" placeholder="Enter current password" required>
              <button type="button" class="pw-eye" data-target="currentPassword"
                aria-label="Toggle password visibility">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                  <line class="eye-slash" x1="2" y1="2" x2="22" y2="22" style="display:none" />
                </svg>
              </button>
            </div>
          </div>

          <!-- New Password -->
          <div class="form-field">
            <label>New Password</label>
            <div class="pw-field">
              <input type="password" id="newPassword" placeholder="Min 8 characters" required>
              <button type="button" class="pw-eye" data-target="newPassword" aria-label="Toggle password visibility">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                  <line class="eye-slash" x1="2" y1="2" x2="22" y2="22" style="display:none" />
                </svg>
              </button>
            </div>
            <div class="pw-strength">
              <div class="pw-strength-bar" id="pwStrengthBar"></div>
            </div>
            <span class="field-error" id="newPwErr"></span>
          </div>

          <!-- Confirm New Password -->
          <div class="form-field">
            <label>Confirm New Password</label>
            <div class="pw-field">
              <input type="password" id="confirmPwInput" placeholder="Repeat new password" required>
              <button type="button" class="pw-eye" data-target="confirmPwInput" aria-label="Toggle password visibility">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                  <line class="eye-slash" x1="2" y1="2" x2="22" y2="22" style="display:none" />
                </svg>
              </button>
            </div>
            <span class="field-error" id="confirmPwErr"></span>
          </div>

        </div>
        <div class="form-actions">
          <button type="submit" class="btn-save">Update Password</button>
        </div>
      </form>
    </div>

  </div>

  <!-- ── CROP MODAL ── -->
  <div class="crop-modal-overlay" id="cropModal">
    <div class="crop-modal">
      <div class="crop-modal-header">
        <h3>Adjust Your Photo</h3>
        <button class="crop-close-btn" id="cropCancelBtn">✕</button>
      </div>
      <div class="crop-modal-body">
        <div class="crop-container">
          <img id="cropImage" src="" alt="Crop">
        </div>
        <div class="crop-controls">
          <label>Zoom</label>
          <div class="zoom-row">
            <span>🔍−</span>
            <input type="range" id="zoomSlider" min="0" max="3" step="0.01" value="0">
            <span>🔍+</span>
          </div>
        </div>
      </div>
      <div class="crop-modal-footer">
        <button class="btn-cancel" id="cropCancelBtn2">Cancel</button>
        <button class="btn-save" id="cropSaveBtn">Save Photo</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/app.js"></script>

  <script>
    // ── Pre-fill form + dirty tracking + cancel ──
    (function () {
      let originalData = {};

      const fields = ['name', 'gender', 'age', 'weight', 'height'];

      function checkDirty() {
        const dirty = fields.some(f => {
          const el = document.getElementById(f);
          return el && String(el.value) !== String(originalData[f] ?? '');
        });
        const saveBtn = document.getElementById('saveBtn');
        if (saveBtn) saveBtn.disabled = !dirty;
      }

      fields.forEach(f => {
        const el = document.getElementById(f);
        if (el) el.addEventListener('input', checkDirty);
      });

      window._prefillForm = function (user) {
        originalData = {
          name: user.name || '',
          gender: user.gender || '',
          age: user.age || '',
          weight: user.weight || '',
          height: user.height || '',
        };
        document.getElementById('name').value = originalData.name;
        document.getElementById('gender').value = originalData.gender;
        document.getElementById('age').value = originalData.age;
        document.getElementById('weight').value = originalData.weight;
        document.getElementById('height').value = originalData.height;
        checkDirty();
      };

      // Cancel edit
      document.getElementById('cancelEditBtn')?.addEventListener('click', () => {
        document.getElementById('editCard').style.display = 'none';
        document.getElementById('profileView').style.display = 'block';
        document.getElementById('backBtn').style.display = 'inline-flex';
        fields.forEach(f => {
          const el = document.getElementById(f);
          if (el) el.value = originalData[f] ?? '';
          const errEl = document.getElementById(f + 'Err');
          if (errEl) errEl.textContent = '';
          if (el) el.classList.remove('invalid');
        });
        checkDirty();
      });

      // Password strength
      document.getElementById('newPassword')?.addEventListener('input', function () {
        const val = this.value;
        const bar = document.getElementById('pwStrengthBar');
        if (bar) {
          let strength = 0;
          if (val.length >= 8) strength++;
          if (/[A-Z]/.test(val)) strength++;
          if (/[0-9]/.test(val)) strength++;
          if (/[^A-Za-z0-9]/.test(val)) strength++;
          const colors = ['#E53935', '#FF9800', '#FFC107', '#4CAF50'];
          bar.style.width = (strength * 25) + '%';
          bar.style.background = colors[strength - 1] || 'transparent';
        }

        // Bug fix 1: re-validate confirm field whenever new password changes
        const confirmInput = document.getElementById('confirmPwInput');
        const err = document.getElementById('confirmPwErr');
        if (confirmInput && err) {
          if (confirmInput.value === '') {
            // Confirm field is empty — clear any stale error
            err.textContent = '';
            confirmInput.classList.remove('invalid');
          } else {
            const match = confirmInput.value === this.value;
            err.textContent = match ? '' : 'Passwords do not match';
            confirmInput.classList.toggle('invalid', !match);
          }
        }

        // Bug fix 2: warn if new password matches current password
        const currentInput = document.getElementById('currentPassword');
        const newPwErr = document.getElementById('newPwErr');
        if (currentInput && newPwErr) {
          if (val && currentInput.value && val === currentInput.value) {
            newPwErr.textContent = 'New password must be different from your current password';
          } else {
            newPwErr.textContent = '';
          }
        }
      });

      // Also trigger same-password check when user types in current password field
      document.getElementById('currentPassword')?.addEventListener('input', function () {
        const newInput = document.getElementById('newPassword');
        const newPwErr = document.getElementById('newPwErr');
        if (newInput && newPwErr) {
          if (this.value && newInput.value && this.value === newInput.value) {
            newPwErr.textContent = 'New password must be different from your current password';
          } else {
            newPwErr.textContent = '';
          }
        }
      });

      // Password eye toggles
      document.querySelectorAll('.pw-eye').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.getElementById(btn.dataset.target);
          if (!input) return;
          const isHidden = input.type === 'password';
          input.type = isHidden ? 'text' : 'password';
          const slash = btn.querySelector('.eye-slash');
          if (slash) slash.style.display = isHidden ? 'block' : 'none';
        });
      });

      // Confirm password match — Bug fix 1: only show error if confirm field has a value
      document.getElementById('confirmPwInput')?.addEventListener('input', function () {
        const np = document.getElementById('newPassword')?.value;
        const err = document.getElementById('confirmPwErr');
        if (err) {
          if (this.value === '') {
            err.textContent = '';
            this.classList.remove('invalid');
          } else {
            const match = this.value === np;
            err.textContent = match ? '' : 'Passwords do not match';
            this.classList.toggle('invalid', !match);
          }
        }
      });

      // Expose to app.js via global
      window._profilePageReady = true;
    })();
  </script>
</body>

</html>
