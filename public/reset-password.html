<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - FitCoach Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --gold:       #F5C518;
      --gold-dim:   #B8950F;
      --gold-soft:  rgba(245, 197, 24, 0.08);
      --bg:         #0A0A0A;
      --bg2:        #111111;
      --bg3:        #1A1A1A;
      --bg4:        #222222;
      --text:       #F0F0F0;
      --text-muted: #888888;
      --text-dim:   #444444;
      --danger:     #E53935;
      --radius:     16px;
      --radius-sm:  10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* ── BACKGROUND ── */
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(245,197,24,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,197,24,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    .bg-glow {
      position: fixed;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,197,24,0.06) 0%, transparent 70%);
      bottom: -200px; right: -150px;
      pointer-events: none; z-index: 0;
    }

    .bg-glow-2 {
      position: fixed;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,197,24,0.04) 0%, transparent 70%);
      top: -100px; left: -100px;
      pointer-events: none; z-index: 0;
    }

    /* ── LAYOUT ── */
    .auth-wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BRAND ── */
    .brand { text-align: center; margin-bottom: 24px; }

    .brand-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem; letter-spacing: 4px;
      color: var(--gold); line-height: 1; display: block;
    }

    .brand-tagline {
      font-size: 0.75rem; color: var(--text-dim);
      letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
    }

    /* ── CARD ── */
    .auth-card {
      background: var(--bg2);
      border: 1px solid rgba(245,197,24,0.1);
      border-radius: var(--radius);
      padding: 36px 36px 32px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* ── ICON ── */
    .card-icon {
      width: 52px; height: 52px;
      background: var(--gold-soft);
      border: 1px solid rgba(245,197,24,0.2);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      color: var(--gold);
    }

    /* ── HEADING ── */
    .auth-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem; letter-spacing: 2px;
      color: var(--text); margin-bottom: 6px;
    }

    .auth-subheading {
      font-size: 0.84rem; color: var(--text-muted);
      margin-bottom: 28px; line-height: 1.6;
    }

    /* ── FIELDS ── */
    .field-group { display: flex; flex-direction: column; gap: 16px; }

    .field-wrap { display: flex; flex-direction: column; }

    .field-label {
      font-size: 0.7rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 7px; display: block;
    }

    .input-shell { position: relative; display: flex; align-items: center; }

    .input-shell input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--bg4);
      border-radius: var(--radius-sm);
      padding: 13px 44px 13px 16px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-shell input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-soft);
    }

    .input-shell input::placeholder { color: var(--text-dim); }

    .input-shell input:-webkit-autofill,
    .input-shell input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #1A1A1A inset;
      -webkit-text-fill-color: var(--text);
    }

    .input-shell input.invalid {
      border-color: var(--danger) !important;
      box-shadow: 0 0 0 3px rgba(229,57,53,0.12);
    }

    .eye {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; color: var(--text-dim);
      display: flex; align-items: center;
      transition: color 0.2s; user-select: none; line-height: 0;
    }

    .eye:hover { color: var(--text-muted); }

    /* ── PASSWORD STRENGTH ── */
    .pw-strength-wrap { margin-top: 8px; }

    .pw-strength-track {
      height: 3px; border-radius: 2px;
      background: var(--bg4); overflow: hidden;
    }

    .pw-strength-bar {
      height: 100%; border-radius: 2px;
      width: 0%; transition: width 0.3s, background 0.3s;
    }

    .pw-strength-label {
      font-size: 0.68rem; color: var(--text-dim);
      margin-top: 4px; height: 14px;
    }

    /* ── FIELD ERROR ── */
    .field-error {
      font-size: 0.72rem;
      color: var(--danger);
      margin-top: 5px;
      min-height: 14px;
      display: block;
    }

    /* ── SUBMIT ── */
    .btn-submit {
      width: 100%; padding: 14px;
      background: var(--gold); color: #000;
      border: none; border-radius: var(--radius-sm);
      font-size: 0.92rem; font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all 0.2s;
      margin-top: 24px; letter-spacing: 0.3px;
      position: relative; overflow: hidden;
    }

    .btn-submit::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }

    .btn-submit:hover {
      background: #f7ce3a;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(245,197,24,0.3);
    }

    .btn-submit:active { transform: translateY(0); }

    /* ── BACK LINK ── */
    .back-link {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-top: 22px;
      font-size: 0.84rem; color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--gold); }
    .back-link svg { transition: transform 0.2s; }
    .back-link:hover svg { transform: translateX(-3px); }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 22px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="brand">
      <span class="brand-logo">FitCoach Pro</span>
      <span class="brand-tagline">Start your transformation today</span>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <div class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>

      <div class="auth-heading">Reset Password</div>
      <div class="auth-subheading">Choose a strong new password for your account.</div>

      <form id="resetForm">
        <div class="field-group">

          <!-- New Password -->
          <div class="field-wrap">
            <label class="field-label">New Password</label>
            <div class="input-shell">
              <input type="password" id="newPassword" placeholder="Min 8 characters" required>
              <span class="eye" onclick="togglePassword('newPassword', this)">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                  <line class="eye-slash" x1="2" y1="2" x2="22" y2="22" style="display:none"/>
                </svg>
              </span>
            </div>
            <!-- Strength bar -->
            <div class="pw-strength-wrap">
              <div class="pw-strength-track">
                <div class="pw-strength-bar" id="strengthBar"></div>
              </div>
              <div class="pw-strength-label" id="strengthLabel"></div>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="field-wrap">
            <label class="field-label">Confirm Password</label>
            <div class="input-shell">
              <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
              <span class="eye" onclick="togglePassword('confirmPassword', this)">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                  <line class="eye-slash" x1="2" y1="2" x2="22" y2="22" style="display:none"/>
                </svg>
              </span>
            </div>
            <span class="field-error" id="confirmPwErr"></span>
          </div>

        </div>

        <button type="submit" class="btn-submit">Reset Password</button>
      </form>

      <a href="login.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back to Sign In
      </a>

    </div>
  </div>

  <script src="js/toast.js"></script>
  <script>
    // Password strength indicator
    document.getElementById('newPassword')?.addEventListener('input', function () {
      const val = this.value;
      const bar = document.getElementById('strengthBar');
      const label = document.getElementById('strengthLabel');
      if (!bar || !label) return;

      let strength = 0;
      if (val.length >= 8) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const configs = [
        { color: '#E53935', text: 'Weak' },
        { color: '#FF9800', text: 'Fair' },
        { color: '#FFC107', text: 'Good' },
        { color: '#4CAF50', text: 'Strong' },
      ];

      bar.style.width = val ? (strength * 25) + '%' : '0%';
      if (val && strength > 0) {
        bar.style.background = configs[strength - 1].color;
        label.textContent = configs[strength - 1].text;
        label.style.color = configs[strength - 1].color;
      } else {
        bar.style.background = 'transparent';
        label.textContent = '';
      }

      // Re-validate confirm if already typed
      const confirmInput = document.getElementById('confirmPassword');
      const err = document.getElementById('confirmPwErr');
      if (err && confirmInput && confirmInput.value !== '') {
        const match = confirmInput.value === this.value;
        err.textContent = match ? '' : 'Passwords do not match';
        confirmInput.classList.toggle('invalid', !match);
      }
    });

    // Live confirm password match validation
    document.getElementById('confirmPassword')?.addEventListener('input', function () {
      const pw = document.getElementById('newPassword')?.value;
      const err = document.getElementById('confirmPwErr');
      if (err) {
        if (this.value === '') {
          err.textContent = '';
          this.classList.remove('invalid');
        } else {
          const match = this.value === pw;
          err.textContent = match ? '' : 'Passwords do not match';
          this.classList.toggle('invalid', !match);
        }
      }
    });
  </script>
  <script src="js/auth.js"></script>
</body>
</html>
